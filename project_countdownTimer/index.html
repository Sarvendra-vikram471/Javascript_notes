<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Olympics 2028 Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="countdown-page">
        <section class="hero" aria-label="Summer Olympics 2028 countdown">
            <div class="rings" aria-hidden="true">
                <span class="ring blue"></span>
                <span class="ring yellow"></span>
                <span class="ring black"></span>
                <span class="ring green"></span>
                <span class="ring red"></span>
            </div>

            <p class="eyebrow">Los Angeles 2028</p>
            <h1>Summer Olympics Countdown</h1>
            <p class="subtitle">Track the time left until the world's biggest summer sporting event begins.</p>

            <div class="timer" aria-label="Countdown timer">
                <div class="time-box">
                    <span id="days" class="time-value">00</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-box">
                    <span id="hours" class="time-value">00</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="time-box">
                    <span id="minutes" class="time-value">00</span>
                    <span class="time-label">Minutes</span>
                </div>
                <div class="time-box">
                    <span id="seconds" class="time-value">00</span>
                    <span class="time-label">Seconds</span>
                </div>
            </div>

            <p class="date-note">Opening ceremony target: July 14, 2028</p>
        </section>
    </main>
    <script src="countdown.js"></script>
</body>
</html>
