<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="calculator">
        <h1>Add Calculator</h1>

        <div class="input-group">
            <label for="firstNumber">First Number</label>
            <input type="number" id="firstNumber" placeholder="Enter first number">
        </div>

        <div class="input-group">
            <label for="secondNumber">Second Number</label>
            <input type="number" id="secondNumber" placeholder="Enter second number">
        </div>

        <button id="addBtn" type="button">Add Numbers</button>

        <div class="result-box">
            <p>Result</p>
            <span id="result">0</span>
        </div>
        <script src="first.js"></script>
    </main>
</body>
</html>
